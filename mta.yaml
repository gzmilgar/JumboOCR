_schema-version: "3.1"
ID: jumbo-ocr
description: Jumbo OCR CAP Service
version: 1.0.0
modules:
- name: ocr-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: ocr-connectivity
  - name: ocr-destination
  - name: ocr-uaa
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci

- name: jumbo-ocr-approuter
  type: approuter.nodejs
  path: app/
  parameters:
    keep-existing-routes: true
    disk-quota: 256M
    memory: 256M
  requires:
  - name: srv-api
    group: destinations
    properties:
      name: srv-api
      url: ~{srv-url}
      forwardAuthToken: true
  - name: ocr-uaa
  - name: ocr-destination
  provides:
  - name: app-api
    properties:
      app-url: ${default-url}

resources:
- name: ocr-connectivity
  type: org.cloudfoundry.managed-service
  parameters:
    service: connectivity
    service-plan: lite

- name: ocr-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: false
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
    service: destination
    service-plan: lite

- name: ocr-uaa
  type: org.cloudfoundry.existing-service
  parameters:
    service-name: jumbo-ocr-xsuaa-service

parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
    - npm --prefix app/ocr-trigger install
    - npm --prefix app/ocr-trigger run build:cf
    - mkdir -p app/fiori
    - cp -r app/ocr-trigger/dist/. app/fiori/
    - rm -rf app/ocr-trigger/node_modules
    - rm -rf app/ocr-trigger/dist    
