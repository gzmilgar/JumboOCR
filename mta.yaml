_schema-version: "3.1"
ID: jumbo-ocr
description: Jumbo OCR CAP Service
version: 1.0.0
modules:
- name: ocr-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: ocr-connectivity
  - name: ocr-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: jumbo-ocr-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: jumbo-ocr-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - comjumboocrocrtrigger.zip
      name: comjumboocrocrtrigger
      target-path: resources/
- name: comjumboocrocrtrigger
  type: html5
  path: app/ocr-trigger
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: ocr-connectivity
  type: org.cloudfoundry.managed-service
  parameters:
    service: connectivity
    service-plan: lite
- name: ocr-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: false
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
    service: destination
    service-plan: lite
- name: jumbo-ocr-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: jumbo-ocr-html5-service
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
